    --accent-3: #4F46E5;
    --success: #10B981;
    --warning: #F59E0B;

  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0;
    background:

    pointer-events: none;
  }
  #app, #toast, #modal-container { position: relative; z-index: 1; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; }
  .card-elevated { background: var(--surface-2); }
  .card-accent { background: linear-gradient(135deg, rgba(99,102,241,.08), rgba(79,70,229,.05)); border-color: rgba(99,102,241,.25); }
  .pill { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:600; }
  .pill-success { background: rgba(16,185,129,.15); color: #6EE7B7; }
  .pill-warning { background: rgba(245,158,11,.15); color: #FCD34D; }
  .pill-danger { background: rgba(239,68,68,.15); color: #FCA5A5; }
  .pill-info { background: rgba(99,102,241,.15); color: #A5B4FC; }
  .pill-neutral { background: var(--surface-3); color: var(--muted); }

  /* Buttons */
  .btn { padding:10px 16px; border-radius:10px; font-weight:600; transition:all .15s; cursor:pointer; font-size:14px; border:none; display:inline-flex; align-items:center; justify-content:center; gap:6px; min-height:42px; }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: linear-gradient(135deg, #6366F1, #4F46E5); color:#fff; box-shadow: 0 4px 14px -2px rgba(99,102,241,.4); }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-success { background: var(--success); color:#fff; }
  .btn-success:hover { background: #059669; }
  .btn-ghost { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface-3); }
  .btn-danger { background: rgba(239,68,68,.15); color: #FCA5A5; border: 1px solid rgba(239,68,68,.3); }
  .btn-icon { width: 38px; height: 38px; padding: 0; }

  /* Sidebar */
  .sidebar { background: rgba(19,24,37,.92); backdrop-filter: blur(20px); border-right: 1px solid var(--border); }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all .15s; }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-item.active {
    background: linear-gradient(135deg, rgba(99,102,241,.2), rgba(79,70,229,.15));
    color: var(--text);
    border: 1px solid rgba(99,102,241,.35);
  }

  .stat-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .gradient-text { background: linear-gradient(135deg, #818CF8, #6366F1, #10B981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .input, select.input, textarea.input {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    color: var(--text);
    font-family: inherit;

  .input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,.15); }

  label.field-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 6px; }

  .anim-fade { animation: fade .35s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: none;} }
  .pulse-dot { animation: pulseDot 2s infinite; }
  @keyframes pulseDot { 0%,100% { opacity: 1; transform: scale(1);} 50% { opacity: .5; transform: scale(1.3);} }

  .bar { background: linear-gradient(180deg, var(--accent), var(--accent-3)); border-radius: 4px 4px 0 0; transition: all .3s; }

  .avatar-grad-7 { background: linear-gradient(135deg, #14B8A6, #0F766E); }
  .avatar-grad-8 { background: linear-gradient(135deg, #EF4444, #B91C1C); }

  .channel-icon { width: 36px; height: 36px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }

  .table-row:hover { background: rgba(255,255,255,.03); }

  .insight-card.critical { background: linear-gradient(135deg, rgba(245,158,11,.08), rgba(239,68,68,.05)); border-color: rgba(245,158,11,.3); }

  #toast { position:fixed; bottom:24px; left:50%; transform: translateX(-50%) translateY(120px);

  .modal-overlay { position: fixed; inset: 0; background: rgba(10,14,26,.85); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fade .2s ease; }

  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }

  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: #3A4257; }

  .sparkline { width: 100%; height: 40px; }
  .clickable { cursor: pointer; }
</style>

function sparkline(data) {
  const max = Math.max(...data);
  const path = data.map((v, i) => `${i === 0 ? 'M' : 'L'} ${(i / (data.length - 1)) * 100} ${100 - (v / max) * 80}`).join(' ');
  return `
    <svg class="sparkline mt-3" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#6366F1" stop-opacity=".4"/>
          <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${path} L 100 100 L 0 100 Z" fill="url(#sparkGrad)"/>
      <path d="${path}" fill="none" stroke="#6366F1" stroke-width="1.5"/>
    </svg>
  `;
}

        <button class="btn btn-danger text-sm" onclick="if(confirm('Supprimer toutes les données et recommencer ?')) Store.reset()">↻ Réinitialiser toutes les données</button>
      </div>
    </div>
  `;
}

function saveSettings() {
  Store.data.settings = {
    agencyName: document.getElementById('setting-agency').value,
    owner: document.getElementById('setting-owner').value,
    split: document.getElementById('setting-split').value,
    timezone: document.getElementById('setting-tz').value
  };
  Store.save();
  showToast('✓ Paramètres enregistrés');
  render();
}
</script>

</body>
</html>
