<style>
  :root {
    --bg: #EEEEF6;
    --surface: #FFFFFF;
    --border: #E2E2EE;
    --text: #16162A;
    --muted: #8080A8;
    --sidebar: #16162A;

    --accent-dark: #4747D1;

    --safe-top: env(safe-area-inset-top, 0px);
  }

  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  html, body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { background: var(--bg); color: var(--text); min-height: 100vh; overscroll-behavior: none; padding-top: var(--safe-top); }

  .btn { padding:14px 18px; border-radius:14px; font-weight:600; transition:all .15s; cursor:pointer; font-size:15px; border:none; min-height:50px; display:inline-flex; align-items:center; justify-content:center; gap:8px; }

  .btn-primary { background: var(--accent); color:#fff; box-shadow: 0 4px 14px -2px var(--accent-shadow); }
  .btn-gold { background: linear-gradient(135deg, #F59E0B, #DC2626); color:#fff; box-shadow: 0 4px 14px -2px rgba(245,158,11,.4); }
  .btn-success { background:#10B981; color:#fff; }
  .btn-ghost { background:#F1F5F9; color: var(--text); }
  .btn-outline { background: transparent; color: var(--text); border:1.5px solid var(--border); }
  .btn-dark { background: #16162A; color:#fff; }
  .btn-lg { padding:16px 24px; font-size:16px; min-height:56px; }

  .input { width:100%; border:1.5px solid var(--border); border-radius:12px; padding:14px 16px; font-size:16px; background:#fff; color: var(--text); }
  .input:focus { outline:none; border-color: var(--accent); }
  .chip-btn { padding:14px; border-radius:12px; border:2px solid var(--border); background:#fff; cursor:pointer; transition:all .15s; text-align:center; min-height:50px; font-weight:600; font-size:14px; }
  .chip-btn:active { transform: scale(.97); }
  .chip-btn.selected { border-color: var(--accent); background: var(--accent); color:#fff; }

  .stat-label { font-size:11px; font-weight:700; color: var(--muted); text-transform:uppercase; letter-spacing:.05em; }
  .gradient-text { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .lead-card.new { border-color:#10B981; border-width:2px; }

  .avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; font-size: 14px; flex-shrink: 0; }

  /* Toggle */
  .toggle { width:40px; height:24px; background:#E5E7EB; border-radius:999px; position:relative; cursor:pointer; transition:background .2s; flex-shrink:0; }
  .toggle.on { background:#10B981; }
  .toggle::after { content:''; position:absolute; top:2px; left:2px; width:20px; height:20px; background:#fff; border-radius:999px; transition:left .2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
  .toggle.on::after { left:18px; }

  /* Demo flow overlay */
  .flow-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: #F2F2F7;
    display: flex; flex-direction: column;
    animation: slideUp .3s ease;

  .flow-header { background: #fff; padding: 14px 16px; padding-top: calc(14px + var(--safe-top)); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .flow-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .flow-controls { padding: 12px 16px; padding-bottom: calc(12px + var(--safe-bottom)); background: #fff; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
  .step-dot { width:8px; height:8px; border-radius:999px; background:#CBD5E1; }
  .step-dot.active { background: var(--accent); transform: scale(1.3); }
  .step-dot.done { background: var(--accent); opacity:.5; }
  .lockscreen-bg { background: linear-gradient(180deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%); }

  .photo-ph { aspect-ratio:1; border-radius:10px; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:28px; opacity:.85; }
  .progress-step { width:28px; height:28px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; background:#F1F5F9; color: var(--muted); flex-shrink: 0; }
  .progress-step.done { background:#10B981; color:#fff; }

  /* Horizontal scroll */
  .h-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .h-scroll::-webkit-scrollbar { display: none; }

  /* Snap sections */
  .snap-section { min-height: 100vh; padding-top: calc(60px + var(--safe-top)); padding-bottom: 100px; }

  /* Bar chart */
  .bar { background: linear-gradient(180deg, var(--accent), var(--accent-dark)); border-radius: 4px 4px 0 0; }

  .hero-h1 { font-size: 42px; line-height: 1.05; font-weight: 900; letter-spacing: -0.02em; }
  .hero-sub { font-size: 17px; line-height: 1.5; color: var(--muted); }
</style>
</head>

function closeOverlay() { document.getElementById('overlay-container').innerHTML = ''; }

let customerStep = 1; const CUSTOMER_TOTAL = 8;
function openCustomerFlow() { customerStep = 1; renderCustomerFlow(); }
function renderCustomerFlow() {
  const t = getTrade();
  const draft = Store.data.newLeadDraft;
  let body = '';

  if (customerStep === 1) body = `<div style="background: #fff; padding: 12px 16px; border-bottom: 1px solid var(--border);"><div class="font-bold">${t.business.name}</div></div><div class="p-4 space-y-3"><div class="sms-in">Hey, <strong style="color: var(--accent-dark);">${t.business.owner.split(' ')[0]} from ${t.business.name}</strong> — sorry I missed your call. Reply <strong>YES</strong>.</div></div>`;
  else if (customerStep === 2) body = `<div style="background: #fff; padding: 12px 16px; border-bottom: 1px solid var(--border);"><div class="font-bold">${t.business.name}</div></div><div class="p-4 space-y-3"><div class="sms-in">Hey, ${t.business.owner.split(' ')[0]}...</div><div class="flex justify-end"><div class="sms-out">YES</div></div></div>`;
  else if (customerStep === 3) body = `<div style="background: #fff; padding: 12px 16px; border-bottom: 1px solid var(--border);"><div class="font-bold">${t.business.name}</div></div><div class="p-4 space-y-3"><div class="flex justify-end"><div class="sms-out">YES</div></div><div class="sms-in">Here's your form: <span class="underline" style="color: var(--accent-dark);">tradiecatch.app/r/sM9xK2</span></div></div>`;
  else if (customerStep === 4) body = `<div style="background: var(--accent);" class="px-4 py-3 text-white"><div class="text-sm font-bold">${t.business.name}</div></div><div class="p-4 space-y-4"><div class="text-xs font-semibold" style="color: var(--muted)">Step 1 of 4</div><div class="h-1.5 rounded-full" style="background:#E2E8F0;"><div class="h-1.5 rounded-full" style="width:25%; background: var(--accent);"></div></div><label class="text-base font-bold block">📍 Where are you?</label><input class="input" value="${draft.address}" /><div class="grid grid-cols-2 gap-2">${t.suburbs.map(s => `<button class="chip-btn ${draft.suburb === s ? 'selected' : ''}">${s}</button>`).join('')}</div></div>`;
  else if (customerStep === 5) body = `<div style="background: var(--accent);" class="px-4 py-3 text-white"><div class="text-sm font-bold">${t.business.name}</div></div><div class="p-4 space-y-4"><div class="text-xs font-semibold" style="color: var(--muted)">Step 2 of 4</div><div class="h-1.5 rounded-full" style="background:#E2E8F0;"><div class="h-1.5 rounded-full" style="width:50%; background: var(--accent);"></div></div><label class="text-base font-bold block">🔧 What's the issue?</label><div class="grid grid-cols-2 gap-2">${t.issueTypes.map(it => `<button class="chip-btn ${draft.issue_type === it.id ? 'selected' : ''}"><div class="text-2xl mb-1">${it.icon}</div><div class="text-xs">${it.label}</div></button>`).join('')}</div></div>`;
  else if (customerStep === 6) body = `<div style="background: var(--accent);" class="px-4 py-3 text-white"><div class="text-sm font-bold">${t.business.name}</div></div><div class="p-4 space-y-4"><div class="text-xs font-semibold" style="color: var(--muted)">Step 3 of 4</div><div class="h-1.5 rounded-full" style="background:#E2E8F0;"><div class="h-1.5 rounded-full" style="width:75%; background: var(--accent);"></div></div><label class="text-base font-bold block">📝 Tell ${t.business.owner.split(' ')[0]} more</label><textarea class="input" rows="3">${draft.description}</textarea><label class="text-base font-bold block">📸 Photos</label><div class="grid grid-cols-3 gap-2"><div class="photo-ph" style="background: linear-gradient(135deg, var(--accent), var(--accent-dark));">${t.issueTypes.find(i => i.id === draft.issue_type)?.icon || '📷'}</div><div class="photo-ph" style="background: linear-gradient(135deg, #94A3B8, #475569);">📷</div><div class="photo-ph" style="background: linear-gradient(135deg, #FCA5A5, #B91C1C);">📷</div></div></div>`;
  else if (customerStep === 7) body = `<div style="background: var(--accent);" class="px-4 py-3 text-white"><div class="text-sm font-bold">${t.business.name}</div></div><div class="p-4 space-y-4"><div class="text-xs font-semibold" style="color: var(--muted)">Step 4 of 4</div><div class="h-1.5 rounded-full" style="background:#E2E8F0;"><div class="h-1.5 rounded-full" style="width:100%; background: var(--accent);"></div></div><label class="text-base font-bold block">⏰ How urgent?</label><div class="grid grid-cols-3 gap-2"><button class="chip-btn"><div>🔥</div>TODAY</button><button class="chip-btn selected"><div>⏰</div>24h</button><button class="chip-btn"><div>📅</div>Week</button></div></div>`;
  else if (customerStep === 8) body = `<div class="p-6 text-center bg-white" style="min-height: 100%;"><div class="w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-5 text-3xl" style="background:#D1FAE5;">✅</div><div class="text-2xl font-bold mb-2">Thanks ${Store.data.customer.name.split(' ')[0]}!</div><p style="color: var(--muted)" class="text-sm">${t.business.owner} will come back within the hour.</p><div class="mt-6 p-3 rounded-lg text-xs" style="background:#FEF3C7; color:#78350F;">💡 No price shown — tradie reviews first.</div></div>`;

  const dots = Array.from({length: CUSTOMER_TOTAL}, (_, i) => `<div class="step-dot ${i + 1 === customerStep ? 'active' : i + 1 < customerStep ? 'done' : ''}"></div>`).join('');

  document.getElementById('overlay-container').innerHTML = `
    <div class="flow-overlay">
      <div class="flow-header">
        <button class="text-2xl px-2" onclick="closeOverlay()">✕</button>
        <div class="flex-1 text-center"><div class="text-xs font-bold uppercase" style="color: var(--muted)">📱 Customer POV</div><div class="text-sm font-semibold">${Store.data.customer.name}</div></div>
        <div style="width:40px;"></div>
      </div>
      <div class="flow-body">${body}</div>
      <div class="flow-controls">
        <button class="btn btn-ghost" onclick="customerPrev()" ${customerStep === 1 ? 'disabled style="opacity:.4"' : ''}>←</button>
        <div class="flex-1 text-center"><div class="text-xs font-semibold" style="color: var(--muted)">Step ${customerStep}/${CUSTOMER_TOTAL}</div><div class="flex gap-1 justify-center mt-1">${dots}</div></div>
        <button class="btn btn-primary" onclick="customerNext()" ${customerStep === CUSTOMER_TOTAL ? 'disabled style="opacity:.4"' : ''}>→</button>
      </div>
    </div>
  `;
}
function customerNext() { if (customerStep < CUSTOMER_TOTAL) { customerStep++; renderCustomerFlow(); } }
function customerPrev() { if (customerStep > 1) { customerStep--; renderCustomerFlow(); } }

let tradieStep = 1; const TRADIE_TOTAL = 5;
function openTradieFlow() { tradieStep = 1; renderTradieFlow(); }
function renderTradieFlow() {
  const t = getTrade();
  let body = '';
  const dark = tradieStep === 1;

  if (tradieStep === 1) body = `<div class="lockscreen-bg flex flex-col p-5" style="min-height: 100%; color: #fff;"><div class="text-center mt-12"><div class="text-6xl font-extralight">9:41</div><div class="text-sm font-medium opacity-80 mt-1">Tuesday, May 12</div></div><div class="mt-10"><div class="rounded-2xl p-4" style="background: rgba(255,255,255,.18); backdrop-filter: blur(20px);"><div class="flex items-center gap-2 mb-2"><div class="w-6 h-6 rounded-md bg-emerald-500 flex items-center justify-center text-xs">📱</div><div class="text-xs font-bold">TRADIECATCH</div><div class="ml-auto text-[10px] opacity-60">now</div></div><div class="text-sm leading-snug">🚨 <strong>NEW LEAD</strong>: ${Store.data.customer.name.split(' ')[0]} M. · Nerang · ${t.issueTypes.find(i => i.id === Store.data.newLeadDraft.issue_type)?.label} · AI $${t.aiQuote.amount.toLocaleString()}<div class="text-xs opacity-80 mt-1">Tap to open</div></div></div></div></div>`;
  else if (tradieStep === 2) body = `<div style="background:#075E54;" class="px-4 py-3 text-white flex items-center gap-3"><div class="text-xl">←</div><div class="w-10 h-10 rounded-full bg-emerald-500 flex items-center justify-center font-bold">TC</div><div><div class="font-bold text-sm">TradieCatch Bot</div></div></div><div class="px-3 py-4" style="background:#e5ddd5; min-height: 100%;"><div class="wa-bubble">🚨 <strong>NEW LEAD</strong><br/>👤 ${Store.data.customer.name}<br/>📍 ${Store.data.customer.address}<br/>🔧 ${Store.data.newLeadDraft.issue_label} (Rinnai, 12yr)<br/>📸 3 photos<br/>💰 <strong>AI: $${t.aiQuote.amount.toLocaleString()}</strong> (${t.aiQuote.confidence}%)<br/>⏰ TODAY<br/><br/>👉 <span class="underline font-bold">Open dossier</span></div></div>`;
  else if (tradieStep === 3) body = `<div style="background: var(--accent);" class="px-4 py-3 text-white"><div class="text-xs opacity-80">← Dossier</div><div class="font-bold">Lead — ${Store.data.customer.name}</div></div><div class="p-4 space-y-3 bg-white" style="min-height: 100%;"><div class="bg-slate-50 rounded-xl p-3 text-sm"><div class="text-xs font-bold mb-1" style="color: var(--muted)">CONTACT</div><div>${Store.data.customer.name}</div><div>📞 ${Store.data.customer.phone}</div><div>📍 ${Store.data.customer.address}</div></div><div><div class="text-xs font-bold mb-2" style="color: var(--muted)">PHOTOS</div><div class="grid grid-cols-3 gap-2"><div class="photo-ph" style="background: linear-gradient(135deg, var(--accent), var(--accent-dark));">${t.issueTypes.find(i => i.id === Store.data.newLeadDraft.issue_type)?.icon}</div><div class="photo-ph" style="background: linear-gradient(135deg, #94A3B8, #475569);">📷</div><div class="photo-ph" style="background: linear-gradient(135deg, #FCA5A5, #B91C1C);">📷</div></div></div><div class="rounded-xl p-3 border-2" style="border-color: var(--accent); background: color-mix(in srgb, var(--accent) 5%, white);"><div class="flex items-center justify-between mb-2"><div class="text-xs font-bold" style="color: var(--accent-dark);">🤖 AI <span class="pro-badge">PRO</span></div><span class="pill" style="background: color-mix(in srgb, var(--accent) 15%, white); color: var(--accent-dark);">${t.aiQuote.confidence}%</span></div><div class="text-sm font-semibold mb-1">${t.aiQuote.label}</div><div class="text-3xl font-extrabold mb-3" style="color: var(--accent-dark);">$${t.aiQuote.amount.toLocaleString()}</div><ul class="text-xs space-y-1 mb-3">${t.aiQuote.breakdown.map(b => `<li>• ${b.l}: <strong>$${b.a.toLocaleString()}</strong></li>`).join('')}</ul>${t.aiQuote.note ? `<div class="bg-amber-100 text-amber-900 rounded-lg p-2 text-xs">⚠️ ${t.aiQuote.note}</div>` : ''}</div></div>`;
  else if (tradieStep === 4) { body = `<div class="bg-white flex flex-col items-center justify-center p-6" style="min-height: 100%;"><div class="text-5xl mb-4 animate-pulse">📤</div><div class="text-xl font-bold mb-2">Sending quote...</div></div>`; setTimeout(() => { if (tradieStep === 4) tradieNext(); }, 1600); }
  else if (tradieStep === 5) body = `<div class="bg-white flex flex-col items-center p-6 pt-12" style="min-height: 100%;"><div class="w-20 h-20 rounded-full flex items-center justify-center mb-5 text-3xl" style="background:#D1FAE5;">✅</div><div class="text-2xl font-bold mb-2">Quote sent!</div><div class="w-full bg-slate-50 rounded-xl p-4 text-sm mb-4"><div class="text-xs font-bold mb-2" style="color: var(--muted)">SENT</div><div>💰 $${t.aiQuote.amount.toLocaleString()}</div><div>📅 Tomorrow 10am</div></div><div class="w-full rounded-xl p-4 border-2" style="background:#ECFDF5; border-color:#10B981;"><div class="flex items-center gap-2 mb-1"><div class="text-lg">💸</div><div class="font-bold text-emerald-800">Deposit received!</div></div><div class="text-xs text-emerald-700">Stripe · $${Math.round(t.aiQuote.amount * 0.2)} · Confirmed ✓</div></div></div>`;

  const dots = Array.from({length: TRADIE_TOTAL}, (_, i) => `<div class="step-dot ${i + 1 === tradieStep ? 'active' : i + 1 < tradieStep ? 'done' : ''}"></div>`).join('');
  const titles = ['Lockscreen notif', 'WhatsApp', 'PWA Dossier', 'Sending...', 'Quote sent + paid'];

  document.getElementById('overlay-container').innerHTML = `
    <div class="flow-overlay">
      <div class="flow-header" style="${dark ? 'background: #1e1b4b; color: #fff;' : ''}">
        <button class="text-2xl px-2" style="${dark ? 'color: #fff;' : ''}" onclick="closeOverlay()">✕</button>
        <div class="flex-1 text-center"><div class="text-xs font-bold uppercase opacity-70">💬 Tradie POV</div><div class="text-sm font-semibold">${titles[tradieStep - 1]}</div></div>
        <div style="width:40px;"></div>
      </div>
      <div class="flow-body">${body}</div>
      <div class="flow-controls">
        <button class="btn btn-ghost" onclick="tradiePrev()" ${tradieStep === 1 ? 'disabled style="opacity:.4"' : ''}>←</button>
        <div class="flex-1 text-center"><div class="text-xs font-semibold" style="color: var(--muted)">Step ${tradieStep}/${TRADIE_TOTAL}</div><div class="flex gap-1 justify-center mt-1">${dots}</div></div>
        ${tradieStep === TRADIE_TOTAL ? `<button class="btn btn-success" onclick="finishTradieFlow()">Done ✓</button>` : `<button class="btn btn-primary" onclick="tradieNext()">${tradieStep === 3 ? '✓ Send' : '→'}</button>`}
      </div>
    </div>

}
function tradieNext() { if (tradieStep < TRADIE_TOTAL) { tradieStep++; renderTradieFlow(); } }
function tradiePrev() { if (tradieStep > 1) { tradieStep--; renderTradieFlow(); } }
function finishTradieFlow() { const t = getTrade(); Store.data.newLeadFinalQuote = t.aiQuote.amount; Store.data.newLeadStatus = 'paid'; Store.save(); closeOverlay(); showToast('✅ Quote sent + deposit received'); switchTab('home'); }
</script>
