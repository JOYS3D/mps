const Store = {
  data: {},
  load() {
    const saved = localStorage.getItem('tradiecatch_v1');
    if (saved) { try { this.data = JSON.parse(saved); } catch { this.data = initialState(); } }
    else { this.data = initialState(); }
  },
  save() { localStorage.setItem('tradiecatch_v1', JSON.stringify(this.data)); },
  reset() { this.data = initialState(); this.save(); }
};
Store.load();

function getTrade() { return TRADES[Store.data.currentTrade]; }

function setTrade(slug) {
  Store.data.currentTrade = slug;
  // Reset trade-specific state when switching
  Store.data.formStep = 1;
  Store.data.newLeadDraft = { address: '', suburb: '', issue_type: '', issue_label: '', description: '', photos: [], urgency: '', availability: [] };
  Store.data.newLeadStatus = 'idle';
  Store.data.newLeadQuote = null;
  Store.data.newLeadFinalQuote = null;
  Store.data.newLeadFeedback = '';
  Store.data.smsThread = [];
  Store.save();
  applyTradeColor();
}

function applyTradeColor() {
  document.body.className = getTrade().colorClass;
}

function resetDemo() {
  if (confirm("Reset all demo data?")) {
    Store.reset();
    applyTradeColor();
    showToast("Demo reset ✓");
    go('home');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

   ============================================================ */
function go(view) {
  window.location.hash = view;
  render();
}

window.addEventListener('hashchange', render);
window.addEventListener('load', () => { applyTradeColor(); render(); });

function renderDevbar() {
  const t = getTrade();
  document.getElementById('devbar').innerHTML = `
    <div class="devbtn" onclick="go('home')">🏠 Home</div>
    <div class="divider"></div>
    ${Object.values(TRADES).map(tr => `
      <div class="devbtn trade-btn ${tr.slug === Store.data.currentTrade ? 'active' : ''}" onclick="setTrade('${tr.slug}'); go('hub')">${tr.icon} ${tr.name}</div>
    `).join('')}
    <div class="divider"></div>
    <div class="devbtn" onclick="go('client/call')">📱 Customer</div>
    <div class="devbtn" onclick="go('tradie/inbox')">🔧 Tradie</div>
    <div class="devbtn" onclick="go('dashboard/overview')">📊 Dashboard</div>
    <div class="divider"></div>
    <div class="devbtn" onclick="resetDemo()" style="color:#fbbf24;">↻ Reset</div>
  `;
}

function render() {
  renderDevbar();
  const route = window.location.hash.replace('#','') || 'home';
  const app = document.getElementById('app');
  app.innerHTML = '';

  if (route === 'home') return renderHome(app);
  if (route === 'hub') return renderHub(app);
  if (route.startsWith('client')) return renderClient(app, route);
  if (route.startsWith('tradie')) return renderTradie(app, route);
  if (route.startsWith('dashboard')) return renderDashboard(app, route);
  if (route.startsWith('referral-landing')) return renderReferralLanding(app);

  renderHome(app);
}

    return `<div class="flex justify-end"><div><div class="sms-out">${m.text}</div><div class="text-[10px] text-slate-400 mt-1 text-right">${m.time}</div></div></div>`;
  }).join('');

  const userReplied = thread.some(m => m.from === 'user');
  const linkSent = thread.some(m => m.from === 'business' && m.text.includes('tradiecatch'));

  let actionButtons = '';
  if (!userReplied) {
    actionButtons = `<div class="border-t border-slate-200 p-3 bg-white"><div class="text-xs text-slate-400 mb-2 text-center">Quick reply</div><div class="flex gap-2"><button class="flex-1 btn btn-success" onclick="replyYes()">Reply YES</button><button class="flex-1 btn btn-ghost" onclick="alert('Demo: reply YES to continue')">No thanks</button></div></div>`;

    ${actionButtons}
  `;
}

  Store.data.smsThread.push({ from: 'user', text: 'YES', time: 'Just now' });
  Store.save();

function getPhotoColor(issue) {
  const map = {
    hotwater: '#fbbf24, #b45309',
    leak: '#94a3b8, #475569',
    drain: '#78716c, #292524',
    notcooling: '#67e8f9, #155e75',
    install: '#cbd5e1, #475569',
    powerout: '#fde047, #a16207',
    switchboard: '#94a3b8, #1e293b',
    green: '#84cc16, #166534',
    cloudy: '#94a3b8, #475569',
    pump: '#64748b, #1e293b',
    salt: '#67e8f9, #155e75'
  };
  return map[issue] || '#94a3b8, #475569';
}

function getPhotoIcon(issue) {
  const icons = { hotwater:'🔥', leak:'💧', drain:'🚽', notcooling:'❄️', install:'🆕', powerout:'⚡', switchboard:'🔌', green:'🌿', cloudy:'💧', pump:'⚙️', salt:'🧂' };
  const icon = icons[issue] || '🔧';
  return `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px;opacity:.7;">${icon}</div>`;
}

function prefillForm() {
  const t = getTrade();
  Store.data.newLeadDraft.address = t.customer.address;
  Store.data.newLeadDraft.suburb = t.customer.address.split(',')[1].trim().split(' ')[0];
  Store.save();
  showToast("Prefilled ✓");
  render();
}

function formNext(currentStep) {
  if (currentStep === 1) {
    const v = document.getElementById('f-address').value;
    if (!v) { showToast("Address required"); return; }
    Store.data.newLeadDraft.address = v;
    const parts = v.split(',');
    Store.data.newLeadDraft.suburb = parts.length > 1 ? parts[1].trim().split(' ')[0] : v;
  }
  if (currentStep === 2 && !Store.data.newLeadDraft.issue_type) { showToast("Pick an issue"); return; }
  if (currentStep === 3) Store.data.newLeadDraft.description = document.getElementById('f-desc').value;
  Store.data.formStep = currentStep + 1;
  Store.save();
  render();
}

function selectIssue(id, label) { Store.data.newLeadDraft.issue_type = id; Store.data.newLeadDraft.issue_label = label; Store.save(); render(); }
function addPhoto(idx) { if (!Store.data.newLeadDraft.photos) Store.data.newLeadDraft.photos = []; Store.data.newLeadDraft.photos[idx] = true; Store.save(); render(); showToast("Photo uploaded ✓"); }
function selectUrgency(u) { Store.data.newLeadDraft.urgency = u; Store.save(); render(); }
function toggleAvail(slot) { const a = Store.data.newLeadDraft.availability || []; const i = a.indexOf(slot); if (i >= 0) a.splice(i, 1); else a.push(slot); Store.data.newLeadDraft.availability = a; Store.save(); render(); }

function submitForm() {
  const t = getTrade();
  const draft = Store.data.newLeadDraft;
  if (!draft.urgency) { showToast("Pick urgency"); return; }
  if (!draft.availability || draft.availability.length === 0) { showToast("Pick at least one slot"); return; }

  const aiData = t.aiQuotes[draft.issue_type] || t.aiQuotes.other;
  Store.data.newLeadStatus = 'submitted';
  Store.data.newLeadQuote = { aiQuote: aiData.quote, confidence: aiData.confidence, label: aiData.label, breakdown: aiData.breakdown, note: aiData.note };
  Store.data.formStep = 1;
  Store.save();
  showToast(`✅ Submitted! ${t.business.owner.split(' ')[0]} is notified.`);
  setTimeout(() => go('client/thanks'), 800);
}

function saveEdit() {
  const newPrice = parseInt(document.getElementById('edit-price').value);
  const feedback = document.getElementById('edit-feedback').value;
  if (!newPrice) { showToast("Enter a price"); return; }
  Store.data.newLeadFinalQuote = newPrice;
  Store.data.newLeadFeedback = feedback;
  Store.data.newLeadStatus = 'quoted';
  if (feedback && feedback.trim().length > 10) {
    const summary = feedback.length > 60 ? feedback.substring(0, 60) + '...' : feedback;
    const t = getTrade();
    if (!t.aiMemory.pricing.some(r => r.includes('NEW:'))) {
      TRADES[Store.data.currentTrade].aiMemory.pricing.unshift(`✨ NEW: ${summary}`);
    }
  }
  Store.save();
  showToast("✅ Quote sent + AI updated");
  setTimeout(() => go('tradie/sent'), 600);
}

  const link = document.getElementById('ref-link').value;

  const msg = `Mate, you using TradieCatch? It catches every missed call and books the customer for you. I've recovered \\$8k this month. \\$200 off setup if you sign up: ${link}`;
  if (channel === 'whatsapp') window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');

}

    </div>
  `;
}
</script>
