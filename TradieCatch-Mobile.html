<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>TradieCatch — Mobile Demo</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EEEEF6;
    --surface: #FFFFFF;
    --border: #E2E2EE;
    --text: #16162A;
    --muted: #8080A8;
    --accent: #3B82F6;
    --accent-dark: #1E40AF;
    --accent-shadow: rgba(59,130,246,.25);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  body.trade-plumber { --accent:#3B82F6; --accent-dark:#1E40AF; --accent-shadow: rgba(59,130,246,.25); }
  body.trade-hvac { --accent:#06B6D4; --accent-dark:#155E75; --accent-shadow: rgba(6,182,212,.25); }
  body.trade-sparky { --accent:#F59E0B; --accent-dark:#B45309; --accent-shadow: rgba(245,158,11,.25); }
  body.trade-pool { --accent:#0891B2; --accent-dark:#0E7490; --accent-shadow: rgba(8,145,178,.25); }

  * { -webkit-tap-highlight-color: transparent; }
  html, body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overscroll-behavior: none;
    padding-top: var(--safe-top);
  }

  .card { background: #fff; border: 1px solid var(--border); border-radius: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .pill { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:999px; font-size:11px; font-weight:600; }
  .btn { padding:14px 18px; border-radius:14px; font-weight:600; transition:all .15s; cursor:pointer; font-size:15px; border:none; min-height:48px; }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color:#fff; box-shadow: 0 4px 14px -2px var(--accent-shadow); }
  .btn-success { background:#10B981; color:#fff; }
  .btn-warning { background:#F59E0B; color:#fff; }
  .btn-ghost { background:#F1F5F9; color: var(--text); }
  .btn-danger-light { background:#FEF2F2; color:#B91C1C; }
  .input { width:100%; border:1.5px solid var(--border); border-radius:12px; padding:14px 16px; font-size:16px; background:#fff; }
  .input:focus { outline:none; border-color: var(--accent); }
  .chip-btn { padding:14px; border-radius:12px; border:2px solid var(--border); background:#fff; cursor:pointer; transition:all .15s; text-align:center; min-height:48px; font-size:14px; font-weight:600; }
  .chip-btn:active { transform: scale(.97); }
  .chip-btn.selected { border-color: var(--accent); background: var(--accent); color:#fff; }
  .stat-label { font-size:11px; font-weight:700; color: var(--muted); text-transform:uppercase; letter-spacing:.05em; }
  .toggle { width:44px; height:26px; background:#E5E7EB; border-radius:999px; position:relative; cursor:pointer; transition:background .2s; flex-shrink:0; }
  .toggle.on { background:#10B981; }
  .toggle::after { content:''; position:absolute; top:3px; left:3px; width:20px; height:20px; background:#fff; border-radius:999px; transition:left .2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
  .toggle.on::after { left:21px; }
  .photo-ph { aspect-ratio:1; border-radius:10px; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:32px; opacity:.85; }
  .anim-fade { animation: fade .25s ease; }
  @keyframes fade { from { opacity:0; transform: translateY(8px);} to { opacity:1; transform:none;} }
  @keyframes pulseNew { 0%,100% { box-shadow: 0 0 0 3px rgba(16,185,129,.15); } 50% { box-shadow: 0 0 0 8px rgba(16,185,129,.05); } }
  .pulse-new { animation: pulseNew 2.5s ease infinite; }

  /* Layout */
  #app { min-height: 100vh; padding-bottom: calc(80px + var(--safe-bottom)); }
  .topbar { position: sticky; top: 0; z-index: 20; background: rgba(255,255,255,.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 12px 16px; }
  .page { padding: 16px; }
  .bar { background: linear-gradient(180deg, var(--accent), var(--accent-dark)); border-radius: 4px 4px 0 0; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid var(--border);
    display: grid; grid-template-columns: repeat(5, 1fr);
    padding-bottom: var(--safe-bottom);
    z-index: 50;
    box-shadow: 0 -4px 20px rgba(0,0,0,.06);
  }
  .nav-tab {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 10px 4px 12px;
    color: var(--muted);
    font-size: 10px; font-weight: 600;
    cursor: pointer;
    position: relative;
    min-height: 60px;
  }
  .nav-tab .nav-icon { font-size: 22px; margin-bottom: 4px; }
  .nav-tab.active { color: var(--accent); }
  .nav-tab.active::before {
    content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 3px;
    background: var(--accent); border-radius: 0 0 4px 4px;
  }
  .nav-tab .badge {
    position: absolute; top: 6px; right: 25%;
    background: #EF4444; color: #fff;
    font-size: 9px; font-weight: 700;
    min-width: 16px; height: 16px;
    border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px;
  }

  /* SMS bubbles */
  .sms-in { background:#E5E7EB; color:#0b1220; border-radius: 18px 18px 18px 4px; padding:10px 14px; max-width:80%; font-size:14px; }
  .sms-out { background:#34C759; color:#fff; border-radius: 18px 18px 4px 18px; padding:10px 14px; max-width:80%; font-size:14px; }
  .sms-system { background:#E5E7EB; color:#475569; padding:6px 14px; border-radius:999px; font-size:11px; font-weight:600; display:inline-block; }

  /* Bigger touch targets */
  button, .clickable { min-height: 44px; }

  /* Toast */
  #toast { position:fixed; top: calc(20px + var(--safe-top)); left:50%; transform: translateX(-50%) translateY(-100px);
    background:#10B981; color:#fff; padding:12px 20px; border-radius:14px; font-weight:600;
    box-shadow:0 10px 30px rgba(16,185,129,.4); transition: transform .3s; z-index:9999; font-size:14px; }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* Trade selection home */
  .trade-card { background: #fff; border:2px solid var(--border); border-radius:18px; padding:20px; cursor:pointer; transition: all .2s; }
  .trade-card:active { transform: scale(.97); border-color: var(--accent); }

  /* Demo flow overlay (full screen takeover) */
  .flow-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: #F2F2F7;
    display: flex; flex-direction: column;
    animation: slideUp .3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .flow-header { background: #fff; padding: 14px 16px; padding-top: calc(14px + var(--safe-top)); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .flow-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .flow-controls { padding: 12px 16px; padding-bottom: calc(12px + var(--safe-bottom)); background: #fff; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
  .step-dots { display:flex; gap:5px; }
  .step-dot { width:8px; height:8px; border-radius:999px; background:#CBD5E1; }
  .step-dot.active { background: var(--accent); transform: scale(1.3); }
  .step-dot.done { background: var(--accent); opacity:.5; }

  /* Lockscreen for tradie POV */
  .lockscreen-bg { background: linear-gradient(180deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%); }

  /* WhatsApp bubble */
  .wa-bubble { background:#dcf8c6; color:#000; border-radius: 10px; padding:12px 14px; font-size:14px; line-height:1.4; }

  /* Calendar mobile (day view) */
  .day-pill { padding: 12px 6px; border-radius: 12px; text-align: center; cursor: pointer; transition: all .15s; flex-shrink: 0; min-width: 56px; }
  .day-pill .day-num { font-size: 18px; font-weight: 700; }
  .day-pill .day-name { font-size: 10px; font-weight: 600; text-transform: uppercase; opacity: .6; }
  .day-pill.active { background: var(--accent); color: #fff; }
  .day-pill.active .day-name { opacity: 1; }

  .event-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 14px; cursor: pointer; }
  .event-card.new { border-color: var(--accent); border-width: 2px; }

  /* Messages */
  .conv-item { padding: 14px 16px; border-bottom: 1px solid #F1F5F9; display: flex; gap: 12px; cursor: pointer; }
  .conv-item:active { background: #F8FAFF; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; font-size: 14px; flex-shrink: 0; }

  .progress-step { width:28px; height:28px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; background:#F1F5F9; color: var(--muted); flex-shrink: 0; }
  .progress-step.active { background: var(--accent); color:#fff; }
  .progress-step.done { background:#10B981; color:#fff; }

  /* Hide on mobile-only utility */
  .scrollbar-thin::-webkit-scrollbar { width: 0; height: 0; }

  /* Force min height for content areas */
  .min-screen { min-height: calc(100vh - 60px - 80px - var(--safe-top) - var(--safe-bottom)); }
</style>
</head>

const Store = {
  data: {},
  load() { const s = localStorage.getItem('tradiecatch_mobile_v1'); if (s) { try { this.data = JSON.parse(s); } catch { this.data = initialState(); } } else { this.data = initialState(); } },
  save() { localStorage.setItem('tradiecatch_mobile_v1', JSON.stringify(this.data)); },
  reset() { this.data = initialState(); this.save(); }
};
Store.load();

function getTrade() { return Store.data.currentTrade ? TRADES[Store.data.currentTrade] : null; }
function applyTradeColor() { document.body.className = Store.data.currentTrade ? `trade-${Store.data.currentTrade}` : 'trade-plumber'; }
function setTrade(slug) { Store.data.currentTrade = slug; Store.save(); applyTradeColor(); }
function resetDemo() { if (confirm('Reset demo?')) { Store.reset(); applyTradeColor(); switchTab('home'); } }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }

function switchTab(tab) {
  Store.data.activeTab = tab;
  Store.save();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.addEventListener('load', () => { applyTradeColor(); render(); });

function render() {
  const app = document.getElementById('app');
  if (!Store.data.currentTrade) { app.innerHTML = renderTradeSelector(); return; }
  const tab = Store.data.activeTab || 'home';
  const pages = { home: pageHome, leads: pageLeads, agenda: pageAgenda, messages: pageMessages, more: pageMore };
  const t = getTrade();
  const newLead = Store.data.newLeadStatus !== 'idle';

  app.innerHTML = `
    <div class="topbar flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center text-lg flex-shrink-0" style="background: var(--accent); color:#fff;">${t.icon}</div>

          <div class="font-extrabold text-base leading-tight">${t.business.name}</div>

      </div>
      <button class="w-10 h-10 rounded-lg flex items-center justify-center relative" style="background: #F1F5F9;" onclick="showDemoMenu()">
        🎬
        ${newLead ? `<div class="absolute -top-1 -right-1 w-5 h-5 rounded-full bg-rose-500 text-white text-[10px] font-bold flex items-center justify-center">1</div>` : ''}

    </div>

    <div class="anim-fade">${pages[tab] ? pages[tab]() : pageHome()}</div>

    <nav class="bottom-nav">
      ${[
        ['home','🏠','Home'],
        ['leads','📥','Leads'],
        ['agenda','📅','Agenda'],
        ['messages','💬','Messages'],
        ['more','⋯','More']
      ].map(([id, icon, name]) => `
        <div class="nav-tab ${tab === id ? 'active' : ''}" onclick="switchTab('${id}')">
          <div class="nav-icon">${icon}</div>
          <div>${name}</div>
          ${id === 'leads' && newLead ? '<div class="badge">1</div>' : ''}
          ${id === 'messages' ? '<div class="badge">3</div>' : ''}
        </div>
      `).join('')}
    </nav>
  `;
}

/* ============================================================
   TRADE SELECTOR (home/onboarding)
   ============================================================ */

function pageAgenda() {
  const t = getTrade();
  const events = [
    { day: 0, start: 8, end: 10, customer: 'Julie Roberts', issue: 'Blocked drain', suburb: 'Beenleigh', amount: 250, type: 'booked' },
    { day: 0, start: 14, end: 15.5, customer: 'Mike Thompson', issue: 'Tap repair', suburb: 'Burleigh', amount: 180, type: 'booked' },
    { day: 1, start: 10, end: 12, customer: 'Tim Kowalski', issue: 'Leaking tap', suburb: 'Logan', amount: 180, type: 'booked' },
    { day: 2, start: 9, end: 11, customer: 'Brad Williams', issue: 'Drain', suburb: 'Helensvale', amount: 320, type: 'booked' },
    { day: 2, start: 14, end: 16, customer: 'Sophie Park', issue: 'Toilet', suburb: 'Robina', amount: 380, type: 'booked' },
    { day: 3, start: 10, end: 12, customer: Store.data.customer.name, issue: 'Hot water', suburb: 'Nerang', amount: Store.data.newLeadFinalQuote || t.aiQuote.amount, type: 'new' },
    { day: 4, start: 8, end: 10, customer: 'Tom Becker', issue: 'Hot water', suburb: 'Broadbeach', amount: 1850, type: 'booked' }
  ];
  const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const dates = [11, 12, 13, 14, 15, 16, 17];
  const activeDay = Store.data.agendaDay !== undefined ? Store.data.agendaDay : 1;
  const dayEvents = events.filter(e => e.day === activeDay).sort((a, b) => a.start - b.start);

  const total = dayEvents.reduce((sum, e) => sum + e.amount, 0);
  const hours = dayEvents.reduce((sum, e) => sum + (e.end - e.start), 0);

  return `
    <div class="page space-y-4">
      <div>
        <h1 class="text-2xl font-extrabold">Agenda</h1>
        <div class="text-xs" style="color: var(--muted)">Week of May 11-17 · Synced with Google ✓</div>
      </div>

      <div class="flex gap-2 overflow-x-auto scrollbar-thin -mx-4 px-4 pb-1">
        ${days.map((d, i) => `
          <div class="day-pill ${activeDay === i ? 'active' : ''}" onclick="setAgendaDay(${i})" style="background: ${activeDay === i ? 'var(--accent)' : '#fff'}; border: 1px solid var(--border);">
            <div class="day-name">${d}</div>
            <div class="day-num">${dates[i]}</div>
          </div>
        `).join('')}
      </div>

      <div class="grid grid-cols-3 gap-2">
        <div class="card p-3 text-center">
          <div class="stat-label">Jobs</div>
          <div class="text-xl font-bold">${dayEvents.length}</div>
        </div>
        <div class="card p-3 text-center">
          <div class="stat-label">Hours</div>
          <div class="text-xl font-bold">${hours}h</div>
        </div>
        <div class="card p-3 text-center">
          <div class="stat-label">Revenue</div>
          <div class="text-xl font-bold">$${(total/1000).toFixed(1)}k</div>
        </div>
      </div>

      <div class="space-y-3">
        ${dayEvents.length === 0 ? `
          <div class="card p-8 text-center">
            <div class="text-4xl mb-2">📭</div>
            <div class="font-semibold mb-1">No jobs</div>
            <div class="text-xs" style="color: var(--muted)">Free slots available — perfect for new leads</div>
          </div>
        ` : dayEvents.map(e => `
          <div class="event-card ${e.type === 'new' ? 'new pulse-new' : ''}" onclick='showEventDetail(${JSON.stringify(e).replace(/'/g, "&apos;")})'>
            <div class="flex items-start gap-3">
              <div class="flex-shrink-0 px-3 py-2 rounded-lg" style="background: ${e.type === 'new' ? 'var(--accent)' : '#F8FAFC'}; color: ${e.type === 'new' ? '#fff' : 'var(--text)'};">
                <div class="text-lg font-bold">${e.start}:00</div>
                <div class="text-[10px] opacity-80">${e.end}:00</div>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  <div class="font-semibold truncate">${e.customer}</div>
                  ${e.type === 'new' ? '<span class="pill bg-emerald-100 text-emerald-700 text-[10px]">🆕</span>' : ''}
                </div>
                <div class="text-xs mb-1" style="color: var(--muted)">${e.issue} · ${e.suburb}</div>
                <div class="text-sm font-bold">$${e.amount.toLocaleString()}</div>
              </div>
              <div class="text-xs" style="color: var(--muted)">›</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

  const t = getTrade();
  const thread = Store.data.smsThread.map(m => {
    let text = m.text || '';

    }
    return { ...m, text };

          <button class="chip-btn ${draft.issue_type === it.id ? 'selected' : ''}">

  } else if (customerStep === 6) {

      <div class="p-4 space-y-4">

      <div style="background: var(--accent);" class="px-4 py-3 text-white"><div class="text-xs opacity-90">tradiecatch.app/r/sM9xK2 🔒</div><div class="text-sm font-bold">${t.business.name}</div></div>

/* TRADIE FLOW — 5 steps */

            📸 3 photos<br/>

            ⏰ TODAY<br/><br/>

      <div style="background: var(--accent);" class="px-4 py-3 text-white">

function tradieNext() { if (tradieStep < TRADIE_TOTAL) { tradieStep++; renderTradieFlow(); } }
function tradiePrev() { if (tradieStep > 1) { tradieStep--; renderTradieFlow(); } }
function finishTradieFlow() {
  const t = getTrade();
  Store.data.newLeadFinalQuote = t.aiQuote.amount;
  Store.data.newLeadStatus = 'paid';
  Store.save();
  closeOverlay();
  showToast('✅ Quote sent + deposit received');
  switchTab('home');
}
