<style>
  :root {
    --bg: #0A0A12;
    --surface: #14141F;
    --surface-2: #1C1C2E;
    --border: #2A2A3F;
    --text: #F5F5FA;
    --muted: #7A7A95;
    --accent: #EC4899;
    --accent-2: #A855F7;
    --accent-3: #06B6D4;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Aurora background */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(circle at 20% 10%, rgba(236,72,153,.08), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(168,85,247,.08), transparent 40%),
      radial-gradient(circle at 70% 30%, rgba(6,182,212,.05), transparent 40%);
    pointer-events: none;
  }
  #app, #toast { position: relative; z-index: 1; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; backdrop-filter: blur(10px); }
  .card-glow { box-shadow: 0 0 0 1px rgba(236,72,153,.2), 0 12px 40px -8px rgba(236,72,153,.15); }
  .pill { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:600; }

  /* Buttons */
  .btn { padding:10px 16px; border-radius:10px; font-weight:600; transition:all .15s; cursor:pointer; font-size:14px; border:none; display:inline-flex; align-items:center; justify-content:center; gap:6px; min-height:42px; text-decoration:none; }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: linear-gradient(135deg, #EC4899, #A855F7); color:#fff; box-shadow: 0 4px 14px -2px rgba(236,72,153,.4); }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-ghost { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { background: #25253A; }
  .btn-icon { width: 36px; height: 36px; padding: 0; }

  /* Sidebar */
  .sidebar { background: rgba(20,20,31,.9); backdrop-filter: blur(20px); border-right: 1px solid var(--border); }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all .15s; }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-item.active {
    background: linear-gradient(135deg, rgba(236,72,153,.18), rgba(168,85,247,.18));
    color: var(--text);
    border: 1px solid rgba(236,72,153,.3);
  }

  /* Stat label */
  .stat-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }

  /* Gradient text */
  .gradient-text { background: linear-gradient(135deg, #EC4899, #A855F7, #06B6D4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  /* Inputs */
  .input { width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 14px; color: var(--text); }
  .input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(236,72,153,.15); }

  /* Anim */
  .anim-fade { animation: fade .35s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: none;} }
  .pulse-dot { animation: pulseDot 2s infinite; }
  @keyframes pulseDot { 0%,100% { opacity: 1; transform: scale(1);} 50% { opacity: .5; transform: scale(1.3);} }

  /* Bar chart bars */
  .bar { background: linear-gradient(180deg, var(--accent), var(--accent-2)); border-radius: 4px 4px 0 0; transition: all .3s; }
  .bar.green { background: linear-gradient(180deg, #10B981, #047857); }
  .bar.cyan { background: linear-gradient(180deg, #06B6D4, #0E7490); }
  .bar.amber { background: linear-gradient(180deg, #F59E0B, #B45309); }

  /* Model avatars */
  .avatar-grad-1 { background: linear-gradient(135deg, #EC4899, #DB2777); }
  .avatar-grad-2 { background: linear-gradient(135deg, #A855F7, #7C3AED); }
  .avatar-grad-3 { background: linear-gradient(135deg, #06B6D4, #0891B2); }
  .avatar-grad-4 { background: linear-gradient(135deg, #F59E0B, #D97706); }
  .avatar-grad-5 { background: linear-gradient(135deg, #10B981, #047857); }
  .avatar-grad-6 { background: linear-gradient(135deg, #EF4444, #B91C1C); }

  /* Heatmap */
  .heat-cell { aspect-ratio: 1; border-radius: 4px; }

  /* Channel icons */
  .channel-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .ch-instagram { background: linear-gradient(135deg, #E1306C, #F77737, #FCAF45); color: #fff; }
  .ch-tiktok { background: #000; color: #fff; border: 1px solid #25F4EE; }
  .ch-tinder { background: linear-gradient(135deg, #FD267D, #FF5864); color: #fff; }
  .ch-reddit { background: #FF4500; color: #fff; }
  .ch-twitter { background: #1DA1F2; color: #fff; }
  .ch-onlyfans { background: linear-gradient(135deg, #00AFF0, #00779E); color: #fff; }

  /* Tags */
  .tag-whale { background: rgba(245,158,11,.15); color: #FCD34D; border: 1px solid rgba(245,158,11,.3); }
  .tag-regular { background: rgba(6,182,212,.15); color: #67E8F9; border: 1px solid rgba(6,182,212,.3); }
  .tag-lurker { background: rgba(122,122,149,.15); color: #C4C4D6; border: 1px solid rgba(122,122,149,.3); }
  .tag-gifter { background: rgba(236,72,153,.15); color: #F9A8D4; border: 1px solid rgba(236,72,153,.3); }
  .tag-chatter { background: rgba(168,85,247,.15); color: #D8B4FE; border: 1px solid rgba(168,85,247,.3); }
  .tag-tipper { background: rgba(16,185,129,.15); color: #6EE7B7; border: 1px solid rgba(16,185,129,.3); }

  /* Tables */
  .table-row { transition: background .15s; }
  .table-row:hover { background: rgba(255,255,255,.03); }

  /* Insight card */
  .insight-card { background: linear-gradient(135deg, rgba(236,72,153,.08), rgba(168,85,247,.08)); border: 1px solid rgba(236,72,153,.25); border-radius: 16px; }
  .insight-card.critical { background: linear-gradient(135deg, rgba(245,158,11,.08), rgba(220,38,38,.08)); border-color: rgba(245,158,11,.3); }

  /* Toast */
  #toast { position:fixed; bottom:24px; left:50%; transform: translateX(-50%) translateY(120px);
    background: linear-gradient(135deg, #EC4899, #A855F7); color:#fff; padding:12px 20px; border-radius:14px; font-weight:600;
    box-shadow:0 10px 30px rgba(236,72,153,.4); transition: transform .3s; z-index:9999; font-size:14px; }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* Funnel */
  .funnel-step { position: relative; padding: 16px 20px; background: var(--surface-2); border-radius: 12px; border-left: 4px solid; }

  /* Wishlist item */
  .wishlist-item { background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: #3A3A55; }

  /* Sparkline */
  .sparkline { width: 100%; height: 40px; }
</style>
</head>

function sparkline(data) {
  const max = Math.max(...data);
  const path = data.map((v, i) => `${i === 0 ? 'M' : 'L'} ${(i / (data.length - 1)) * 100} ${100 - (v / max) * 80}`).join(' ');
  return `
    <svg class="sparkline mt-3" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#EC4899" stop-opacity=".4"/>
          <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${path} L 100 100 L 0 100 Z" fill="url(#sparkGrad)"/>
      <path d="${path}" fill="none" stroke="#EC4899" stroke-width="1.5"/>
    </svg>
  `;
}

      <div class="card p-5"><div class="stat-label mb-1">Agency profit (40%)</div><div class="text-3xl font-extrabold gradient-text">$${Math.round(TOTAL_REVENUE * 0.32).toLocaleString()}</div></div>
    </div>

    <div class="card overflow-hidden">
      <div class="p-4 border-b" style="border-color: var(--border);">
        <div class="font-bold">Revenue split by model</div>
      </div>
      <table class="w-full text-sm">
        <thead>
          <tr class="text-xs border-b" style="border-color: var(--border); color: var(--muted)">
            <th class="text-left py-3 px-4 font-semibold">MODEL</th>
            <th class="text-right font-semibold">GROSS</th>
            <th class="text-right font-semibold">OF FEE (20%)</th>
            <th class="text-right font-semibold">NET</th>
            <th class="text-right font-semibold">MODEL SHARE (60%)</th>
            <th class="text-right font-semibold">AGENCY (40%)</th>
            <th class="text-right font-semibold">PRODUCTION COST</th>
            <th class="text-right font-semibold">AGENCY PROFIT</th>
          </tr>
        </thead>
        <tbody>
          ${MODELS.map(m => {
            const ofFee = m.revenue * 0.2;
            const net = m.revenue - ofFee;
            const modelShare = net * 0.6;
            const agencyShare = net * 0.4;
            const prodCost = m.contentCount * 75;
            const profit = agencyShare - prodCost;
            return `
              <tr class="table-row border-b" style="border-color: var(--border);">
                <td class="py-3 px-4">
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full ${m.avatar} flex items-center justify-center text-xs font-bold">${m.name.split(' ').map(s => s[0]).join('')}</div>
                    <div class="font-semibold">${m.name}</div>
                  </div>
                </td>
                <td class="text-right">$${m.revenue.toLocaleString()}</td>
                <td class="text-right" style="color: var(--muted)">-$${Math.round(ofFee).toLocaleString()}</td>
                <td class="text-right font-semibold">$${Math.round(net).toLocaleString()}</td>
                <td class="text-right" style="color: var(--muted)">$${Math.round(modelShare).toLocaleString()}</td>
                <td class="text-right gradient-text font-bold">$${Math.round(agencyShare).toLocaleString()}</td>
                <td class="text-right" style="color: var(--muted)">-$${prodCost.toLocaleString()}</td>
                <td class="text-right font-bold ${profit > 0 ? 'text-emerald-400' : 'text-rose-400'}">$${Math.round(profit).toLocaleString()}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}
