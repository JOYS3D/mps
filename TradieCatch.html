  .chip-btn { padding:12px; border-radius:12px; border:2px solid var(--border); background:#fff; cursor:pointer; transition:all .15s; text-align:center; min-height:48px; font-weight:600; font-size:14px; }

    position: absolute; top: 4px; right: 22%;
    background: #EF4444; color: #fff;

  .phone-sms-in { background:#E5E5EA; color:#000; border-radius: 18px 18px 18px 4px; padding:10px 14px; max-width:75%; font-size:14px; }

  @media (max-width: 768px) {
    .dashboard-app { padding-bottom: calc(80px + var(--safe-bottom)); }
  }
</style>

  save() { localStorage.setItem('tradiecatch_definitive_v1', JSON.stringify(this.data)); },

};

function getTrade() { return Store.data.currentTrade ? TRADES[Store.data.currentTrade] : TRADES.plumber; }

function go(mode) {
  Store.data.mode = mode;
  Store.save();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function switchTab(tab) { Store.data.activeTab = tab; Store.save(); render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

  else if (tradieStep === 3) body = `<div style="background: var(--accent);" class="px-4 py-3 text-white"><div class="text-xs opacity-80">← Dossier</div><div class="font-bold">Lead — ${Store.data.customer.name}</div></div><div class="p-4 space-y-3 bg-white" style="min-height: 100%;"><div class="bg-slate-50 rounded-xl p-3 text-sm"><div class="text-xs font-bold mb-1" style="color: var(--muted)">CONTACT</div><div>${Store.data.customer.name}</div><div>📞 ${Store.data.customer.phone}</div><div>📍 ${Store.data.customer.address}</div></div><div><div class="text-xs font-bold mb-2" style="color: var(--muted)">PHOTOS</div><div class="grid grid-cols-3 gap-2"><div class="photo-ph" style="background: linear-gradient(135deg, var(--accent), var(--accent-dark));">${t.issueTypes.find(i => i.id === Store.data.newLeadDraft.issue_type)?.icon}</div><div class="photo-ph" style="background: linear-gradient(135deg, #94A3B8, #475569);">📷</div><div class="photo-ph" style="background: linear-gradient(135deg, #FCA5A5, #B91C1C);">📷</div></div></div><div class="rounded-xl p-3 border-2" style="border-color: var(--accent); background: color-mix(in srgb, var(--accent) 5%, white);"><div class="flex items-center justify-between mb-2"><div class="text-xs font-bold" style="color: var(--accent-dark);">🤖 AI ANALYSIS <span class="pro-badge">PRO</span></div><span class="pill" style="background: color-mix(in srgb, var(--accent) 15%, white); color: var(--accent-dark);">${t.aiQuote.confidence}% conf</span></div><div class="text-sm font-semibold mb-1">${t.aiQuote.label}</div><div class="text-3xl font-extrabold mb-3" style="color: var(--accent-dark);">$${t.aiQuote.amount.toLocaleString()}</div><ul class="text-xs space-y-1 mb-3">${t.aiQuote.breakdown.map(b => `<li>• ${b.l}: <strong>$${b.a.toLocaleString()}</strong></li>`).join('')}</ul>${t.aiQuote.note ? `<div class="bg-amber-100 text-amber-900 rounded-lg p-2 text-xs">⚠️ ${t.aiQuote.note}</div>` : ''}</div></div>`;
  else if (tradieStep === 4) { body = `<div class="bg-white flex flex-col items-center justify-center p-6" style="min-height: 100%;"><div class="text-5xl mb-4 animate-pulse">📤</div><div class="text-xl font-bold mb-2">Sending quote...</div><div class="text-sm text-center" style="color: var(--muted)">SMS + Stripe link to ${Store.data.customer.name}</div></div>`; setTimeout(() => { if (tradieStep === 4) tradieNext(); }, 1600); }
  else if (tradieStep === 5) body = `<div class="bg-white flex flex-col items-center p-6 pt-12" style="min-height: 100%;"><div class="w-20 h-20 rounded-full flex items-center justify-center mb-5 text-3xl" style="background:#D1FAE5;">✅</div><div class="text-2xl font-bold mb-2">Quote sent!</div><div class="w-full bg-slate-50 rounded-xl p-4 text-sm mb-4"><div class="text-xs font-bold mb-2" style="color: var(--muted)">SENT</div><div>💰 $${t.aiQuote.amount.toLocaleString()}</div><div>📅 Tomorrow Tue 10am-12pm</div></div><div class="w-full rounded-xl p-4 border-2" style="background:#ECFDF5; border-color:#10B981;"><div class="flex items-center gap-2 mb-1"><div class="text-lg">💸</div><div class="font-bold text-emerald-800">Deposit received!</div></div><div class="text-xs text-emerald-700">Stripe · $${Math.round(t.aiQuote.amount * 0.2)} · Calendar confirmed ✓</div></div></div>`;

  const dots = Array.from({length: TRADIE_TOTAL}, (_, i) => `<div class="step-dot ${i + 1 === tradieStep ? 'active' : i + 1 < tradieStep ? 'done' : ''}"></div>`).join('');
  const titles = ['Lockscreen notif', 'WhatsApp', 'PWA Dossier', 'Sending...', 'Quote sent + paid'];

  document.getElementById('overlay-container').innerHTML = `
    <div class="flow-overlay">
      <div class="flow-header" style="${dark ? 'background: #1e1b4b; color: #fff;' : ''}">
        <button class="text-2xl px-2" style="${dark ? 'color: #fff;' : ''}" onclick="closeOverlay()">✕</button>
        <div class="flex-1 text-center"><div class="text-xs font-bold uppercase opacity-70">💬 Tradie POV</div><div class="text-sm font-semibold">${titles[tradieStep - 1]}</div></div>
        <div style="width:40px;"></div>
      </div>
      <div class="flow-body">${body}</div>
      <div class="flow-controls">
        <button class="btn btn-ghost" onclick="tradiePrev()" ${tradieStep === 1 ? 'disabled style="opacity:.4"' : ''}>←</button>
        <div class="flex-1 text-center"><div class="text-xs font-semibold" style="color: var(--muted)">Step ${tradieStep}/${TRADIE_TOTAL}</div><div class="flex gap-1 justify-center mt-1">${dots}</div></div>
        ${tradieStep === TRADIE_TOTAL ? `<button class="btn btn-success" onclick="finishTradieFlow()">Done ✓</button>` : `<button class="btn btn-primary" onclick="tradieNext()">${tradieStep === 3 ? '✓ Send' : '→'}</button>`}
      </div>
    </div>
  `;
}
function tradieNext() { if (tradieStep < TRADIE_TOTAL) { tradieStep++; renderTradieFlow(); } }
function tradiePrev() { if (tradieStep > 1) { tradieStep--; renderTradieFlow(); } }
function finishTradieFlow() { const t = getTrade(); Store.data.newLeadFinalQuote = t.aiQuote.amount; Store.data.newLeadStatus = 'paid'; Store.save(); closeOverlay(); showToast('✅ Quote sent + deposit received'); switchTab('home'); }
</script>

</body>
</html>
